name: Deploy Docs

# Builds the VitePress site in /docs and publishes it to GitHub Pages.
# The deployed site lives at https://<owner>.github.io/<repo>/ so the
# DOCS_BASE env var pins the base URL for asset resolution.

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

# One concurrent deploy at a time. Never cancel an in-flight deploy
# midway, that leaves Pages in an inconsistent state.
concurrency:
  group: pages
  cancel-in-progress: false

# GitHub Pages deployments need these scopes.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build docs
        env:
          # actions/configure-pages returns the correct base for this repo
          # (e.g. "/nova/"). Fall back to "/" for forks or custom domains.
          DOCS_BASE: ${{ steps.pages.outputs.base_path && format('{0}/', steps.pages.outputs.base_path) || '/' }}
        run: pnpm docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
